version: "3.3"

services:
  # Servico do backend Spring Boot.
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sistema-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:h2:file:/data/avaliacaodb
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: ""
      SPRING_H2_CONSOLE_ENABLED: "true"
      SPRING_H2_CONSOLE_PATH: /h2-console
    volumes:
      # Volume para persistir dados do H2 entre reinicios.
      - h2_data:/data
    restart: unless-stopped

  # Servico do frontend React (build Vite + Nginx).
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: sistema-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  # Volume nomeado usado pelo banco H2 em arquivo.
  h2_data:

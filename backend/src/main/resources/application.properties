spring.application.name=backend

# Banco H2 em arquivo local para manter dados entre reinicios.
spring.datasource.url=jdbc:h2:file:./data/avaliacaodb
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Console web do H2 para inspecionar tabelas e registros.
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# Parametros de JWT usados na autenticacao da API.
app.jwt.secret=change-me-in-production
app.jwt.expiration=86400000
